syntax = "proto3";

package kerneleye.v1;

option go_package = "github.com/kerneleye/proto/gen/go/kerneleye/v1;kerneleyev1";

import "google/protobuf/timestamp.proto";

// IngestService handles agent communication
service IngestService {
  // Agent sends heartbeat every 30s
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  
  // Agent pushes aggregated traffic stats
  rpc SubmitTraffic(TrafficBatch) returns (TrafficResponse);

  // Agent requests registration
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Agent polls for approval status
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  
  // Agent requests blocking directives (Phase 2)
  rpc GetBlockList(BlockListRequest) returns (BlockListResponse);

  // Agent reports blocked IP events
  rpc ReportBlockedIP(BlockedIPEvent) returns (BlockedIPResponse);
  
  // Agent reports XDP blocked packet events (real-time)
  rpc ReportBlockedPacket(BlockedPacketEvent) returns (BlockedPacketResponse);
}

message RegisterRequest {
  string user_id = 1;
  string hostname = 2;
  string ip_address = 3;  // Agent's public IP address
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
  string client_token = 3;
  string status = 4;
}

message GetStatusRequest {
  string client_token = 1;
}

message GetStatusResponse {
  string status = 1;
  string api_key = 2;
}

// ============================================
// Heartbeat - Keep-Alive & Health Checks
// ============================================

message HeartbeatRequest {
  string api_key = 1;
  string hostname = 2;
  string agent_version = 3;
  string ip_address = 4;  // Agent's detected public IP address
}

message HeartbeatResponse {
  bool success = 1;
  string message = 2;
  
  // Server can push config updates
  optional ConfigUpdate config = 3;
}

message ConfigUpdate {
  optional uint32 flush_interval_seconds = 1;
  optional bool enable_udp_monitoring = 2;
  optional bool enable_blocking = 3;
  
  // Scoring configuration from agent
  optional uint32 scoring_threshold_suspicious = 4;
  optional uint32 scoring_threshold_malicious = 5;
  optional uint32 scoring_auto_block_threshold = 6;
}

// ============================================
// Traffic Submission - Main Data Flow
// ============================================

message TrafficBatch {
  string api_key = 1;
  string server_id = 2; // UUID assigned on registration
  
  google.protobuf.Timestamp timestamp_start = 3;
  google.protobuf.Timestamp timestamp_end = 4;
  
  repeated ConnectionEvent events = 5;
  
  // Batch-level metadata
  uint64 total_events = 6;
  uint32 aggregation_window_seconds = 7;
}

message ConnectionEvent {
  string source_ip = 1;
  uint32 destination_port = 2;
  Protocol protocol = 3;
  
  // Aggregated metrics for this IP in the window
  uint32 syn_count = 4;
  uint32 ack_count = 5;
  uint32 failed_handshakes = 6;
  
  // Bytes transferred (estimated from packet counts)
  uint64 bytes_in = 7;
  uint64 bytes_out = 8;
  
  // First and last seen in this window
  google.protobuf.Timestamp first_seen = 9;
  google.protobuf.Timestamp last_seen = 10;
  
  // Number of unique ports accessed (scanning indicator)
  uint32 unique_ports_count = 11;
  repeated uint32 ports_accessed = 12; // Limited to top 10
  
  // Traffic direction
  Direction direction = 13;
  
  // Destination endpoint IP (for proper source/destination display)
  string destination_ip = 14;

  // Threat scoring fields (computed by agent)
  uint32 threat_score = 15;
  ThreatLevel threat_level = 16;
  ThreatType threat_type = 17;
  repeated string reasons = 18;

  // ICMP activity (populated from icmp_counters BPF map via TC hooks)
  uint64 icmp_packets_in = 19;
  uint64 icmp_packets_out = 20;

  // Duration of first→last event in this aggregation window (milliseconds).
  // Short window + high SYN = burst/flood; long window + low SYN = slow scan.
  uint64 connection_duration_ms = 21;

  // Per-service-port byte breakdown (limited to top 10 ports, from ip_port_bytes BPF map).
  // Keys are port numbers as uint32 (proto3 map keys must be integral or string).
  map<uint32, uint64> port_bytes_in = 22;
  map<uint32, uint64> port_bytes_out = 23;
}

enum ThreatLevel {
  THREAT_LEVEL_NORMAL = 0;
  THREAT_LEVEL_SUSPICIOUS = 1;
  THREAT_LEVEL_MALICIOUS = 2;
}

enum ThreatType {
  THREAT_TYPE_NONE = 0;
  THREAT_TYPE_PORT_SCAN = 1;
  THREAT_TYPE_SERVICE_ABUSE = 2;
  THREAT_TYPE_SYN_FLOOD = 3;
  THREAT_TYPE_FAILED_HANDSHAKE = 4;
  THREAT_TYPE_CONNECTION_BURST = 5;
}

enum Protocol {
  PROTOCOL_UNKNOWN = 0;
  PROTOCOL_TCP = 1;
  PROTOCOL_UDP = 2;
  PROTOCOL_ICMP = 3;
}

enum Direction {
  DIRECTION_UNKNOWN = 0;
  DIRECTION_INBOUND = 1;  // Someone connecting to us
  DIRECTION_OUTBOUND = 2; // We connecting to someone
}

message TrafficResponse {
  bool success = 1;
  string message = 2;
  
  // Number of events accepted
  uint64 events_processed = 3;
  
  // Immediate alerts to show in agent logs
  repeated Alert alerts = 4;
}

message Alert {
  string ip_address = 1;
  uint32 threat_score = 2;
  string reason = 3; // e.g., "Port scanning detected"
  Severity severity = 4;
}

enum Severity {
  SEVERITY_INFO = 0;
  SEVERITY_WARNING = 1;
  SEVERITY_CRITICAL = 2;
}

// ============================================
// Blocking (Phase 2 Feature)
// ============================================

message BlockListRequest {
  string api_key = 1;
  string server_id = 2;
  
  // Request IPs to block since last fetch
  google.protobuf.Timestamp since = 3;
}

message BlockListResponse {
  repeated BlockDirective directives = 1;
}

message BlockDirective {
  string ip_address = 1;
  BlockAction action = 2;
  google.protobuf.Timestamp expires_at = 3; // Auto-unblock time
  string reason = 4;
}

enum BlockAction {
  BLOCK_ACTION_ALLOW = 0;
  BLOCK_ACTION_BLOCK = 1;
  BLOCK_ACTION_RATE_LIMIT = 2; // Future
}

// ============================================
// Agent Blocked IP Reporting
// ============================================

message BlockedIPEvent {
  string api_key = 1;
  string server_id = 2;
  string ip_address = 3;
  BlockAction action = 4;
  uint32 duration_seconds = 5;
  string reason = 6;
  google.protobuf.Timestamp blocked_at = 7;
  
  // Service Targeted
  uint32 target_port = 8;
  string service_name = 9;
  Protocol protocol = 10;
  
  // Agent Info
  string agent_version = 11;
}

message BlockedIPResponse {
  bool success = 1;
}

// ============================================
// XDP Blocked Packet Events (Real-time)
// ============================================

message BlockedPacketEvent {
  string api_key = 1;
  string server_id = 2;
  
  string source_ip = 3;
  uint32 destination_port = 4;
  Protocol protocol = 5;
  
  // Reason why packet was blocked
  BlockReason reason = 6;
  
  // Timestamps
  google.protobuf.Timestamp timestamp = 7;
  uint64 timestamp_ns = 8;  // Raw nanoseconds from BPF
  
  // Optional: packet size info
  uint32 packet_size = 9;
}

enum BlockReason {
  BLOCK_REASON_UNKNOWN = 0;
  BLOCK_REASON_BLOCKLIST = 1;    // IP was in blocklist
  BLOCK_REASON_CIDR = 2;         // IP matched CIDR range
  BLOCK_REASON_RATE_LIMIT = 3;   // Rate limit exceeded
}

message BlockedPacketResponse {
  bool success = 1;
}

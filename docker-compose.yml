services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: kerneleye-db
    environment:
      POSTGRES_DB: kerneleye
      POSTGRES_USER: kerneleye
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kerneleye']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    image: registry.hakiware.com/kerneleye/backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kerneleye-api
    environment:
      DATABASE_URL: postgres://kerneleye:${DB_PASSWORD:-changeme}@postgres:5432/kerneleye?sslmode=disable
      PORT: 8080
      GRPC_PORT: 9091
      CORS_ORIGINS: http://localhost:3000,https://app.kerneleye.io,https://app.kerneleye.cloud
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      API_KEY_SECRET: ${API_KEY_SECRET:-change-in-production}
      DASHBOARD_URL: ${DASHBOARD_URL:-https://app.kerneleye.cloud}
      MAILTRAP_API_TOKEN: ${MAILTRAP_API_TOKEN:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@kerneleye.cloud}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-KernelEye}
      POLAR_WEBHOOK_SECRET: ${POLAR_WEBHOOK_SECRET:-}
      POLAR_ACCESS_TOKEN: ${POLAR_ACCESS_TOKEN:-}
    ports:
      - '8080:8080'
      - '9091:9091'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (Landing + Dashboard)
  # Serves static files only - API calls go directly to backend
  frontend:
    image: registry.hakiware.com/kerneleye/frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: kerneleye-frontend
    environment:
      # Backend API URL (for dashboard runtime config)
      BACKEND_HOST: ${BACKEND_HOST:-api.kerneleye.cloud}
      BACKEND_PORT: ${BACKEND_PORT:-443}
      # Domain names (for nginx server_name)
      LANDING_DOMAIN: ${LANDING_DOMAIN:-kerneleye.cloud}
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN:-app.kerneleye.cloud}
    ports:
      - '80:80'
      - '443:443'
    restart: unless-stopped

  # Redis (Optional - for caching in production)
  redis:
    image: redis:7-alpine
    container_name: kerneleye-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

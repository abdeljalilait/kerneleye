services:
  # PostgreSQL Database
  postgres:
    networks:
      - dokploy-network
    image: postgres:15-alpine
    pull_policy: always
    environment:
      POSTGRES_DB: kerneleye
      POSTGRES_USER: kerneleye
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kerneleye']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    networks:
      - dokploy-network
    image: registry.hakiware.com/kerneleye/backend:latest
    pull_policy: always
    environment:
      GEOIP_DIR: /opt/kerneleye/geoip
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY}
      DATABASE_URL: postgres://kerneleye:${DB_PASSWORD}@postgres:5432/kerneleye?sslmode=disable
      PORT: 8080
      GRPC_PORT: 9091
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      API_KEY_SECRET: ${API_KEY_SECRET}
      DASHBOARD_URL: ${DASHBOARD_URL}
      MAILTRAP_API_TOKEN: ${MAILTRAP_API_TOKEN}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      POLAR_WEBHOOK_SECRET: ${POLAR_WEBHOOK_SECRET}
      POLAR_ACCESS_TOKEN: ${POLAR_ACCESS_TOKEN}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH_REDIRECT_URL: ${OAUTH_REDIRECT_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (Landing + Dashboard)
  # Serves static files only - API calls go directly to backend
  frontend:
    networks:
      - dokploy-network
    image: registry.hakiware.com/kerneleye/frontend:latest
    pull_policy: always
    environment:
      # Domain names (for nginx server_name)
      LANDING_DOMAIN: ${LANDING_DOMAIN}
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN}
    restart: unless-stopped

  # Redis (Optional - for caching in production)
  redis:
    networks:
      - dokploy-network
    image: redis:7-alpine
    pull_policy: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

networks:
  dokploy-network:
    external: true

services:
  # PostgreSQL Database
  kerneleye-db:
    networks:
      - dokploy-network
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kerneleye
      POSTGRES_USER: kerneleye
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kerneleye']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    networks:
      - dokploy-network
    image: ghcr.io/kerneleye/backend:latest
    pull_policy: always
    volumes:
      - ../files/geoip:/opt/kerneleye/geoip
      - ./certs:/certs:ro
    ports:
      - "9091:9091"
    # expose:  # Not needed when ports: is used
    #   - "8080"
    #   - "9091"
    # ports:
    #   - "9091:9091"
    environment:
      DATABASE_URL: postgres://kerneleye:${DB_PASSWORD}@kerneleye-db:5432/kerneleye?sslmode=require
      GEOIP_DIR: /opt/kerneleye/geoip
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY}
      INSTALL_DOMAIN: ${INSTALL_DOMAIN}
      KERNELEYE_SERVER : ${KERNELEYE_SERVER}
      KERNELEYE_GRPC_URL : ${KERNELEYE_GRPC_URL}
      PORT: 8080
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      GRPC_PORT: 9091
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      API_KEY_SECRET: ${API_KEY_SECRET}
      DASHBOARD_URL: ${DASHBOARD_URL}
      MAILTRAP_API_TOKEN: ${MAILTRAP_API_TOKEN}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH_REDIRECT_URL: ${OAUTH_REDIRECT_URL}
      AUTH_OWNER_EMAIL: ${AUTH_OWNER_EMAIL}
      # gRPC TLS (server certificate)
      GRPC_TLS_CERT_FILE: ${GRPC_TLS_CERT_FILE:-/certs/server.crt}
      GRPC_TLS_KEY_FILE: ${GRPC_TLS_KEY_FILE:-/certs/server.key}
      # mTLS (optional — uncomment to require agent client certificates)
      # GRPC_MTLS_CA_FILE: ${GRPC_MTLS_CA_FILE:-/certs/ca.crt}
    depends_on:
      kerneleye-db:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
    
      # HTTP API
      - "traefik.http.routers.kernelapi.rule=Host(`api.example.com`)"
      - "traefik.http.routers.kernelapi.entrypoints=websecure"
      - "traefik.http.routers.kernelapi.tls=true"
      - "traefik.http.routers.kernelapi.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kernelapi.service=kernelapi"
      - "traefik.http.services.kernelapi.loadbalancer.server.port=8080"
      - "traefik.http.services.kernelapi.loadbalancer.server.scheme=http"

      # gRPC: direct TLS on port 9091 (bypasses Traefik entirely).
      # Port 9091 is published above. Backend terminates TLS using certs from ./certs/.
      # Agents connect to: grpc.example.com:9091 (TLS)
      # To use Traefik TCP passthrough instead, comment the ports: block above
      # and uncomment the Traefik TCP router below.
      #
      # # Traefik TCP passthrough for gRPC (optional alternative to direct TLS):
      # - "traefik.tcp.routers.kernelgrpc.rule=HostSNI(`grpc.example.com`)"
      # - "traefik.tcp.routers.kernelgrpc.entrypoints=websecure"
      # - "traefik.tcp.routers.kernelgrpc.tls.passthrough=true"
      # - "traefik.tcp.routers.kernelgrpc.service=kernelgrpc"
      # - "traefik.tcp.services.kernelgrpc.loadbalancer.server.port=9091"

  # Frontend (Landing + Dashboard)
  # Serves static files only - API calls go directly to backend
  frontend:
    networks:
      - dokploy-network
    image: ghcr.io/kerneleye/frontend:latest
    pull_policy: always
    environment:
      # Backend API URL (for dashboard runtime config)
      BACKEND_HOST: ${BACKEND_HOST}
      BACKEND_PORT: ${BACKEND_PORT}
      # Domain names (for nginx server_name)
      LANDING_DOMAIN: ${LANDING_DOMAIN}
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN}
    restart: unless-stopped

  # Redis (Optional - for caching in production)
  redis:
    image: redis:7-alpine
    pull_policy: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
volumes:
  postgres_data:
  redis_data:

networks:
  dokploy-network:
    external: true

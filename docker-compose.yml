services:
  # PostgreSQL Database
  kerneleye-db:
    networks:
      - dokploy-network
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kerneleye
      POSTGRES_USER: kerneleye
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kerneleye']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    networks:
      - dokploy-network
    image: registry.hakiware.com/kerneleye/backend:latest
    pull_policy: always
    volumes:
      - ../files/geoip:/opt/kerneleye/geoip
    expose:
      - "8080"
      - "9091"
    # ports:
    #   - "9091:9091"
    environment:
      DATABASE_URL: postgres://kerneleye:${DB_PASSWORD}@kerneleye-db:5432/kerneleye?sslmode=require
      GEOIP_DIR: /opt/kerneleye/geoip
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY}
      INSTALL_DOMAIN: ${INSTALL_DOMAIN}
      KERNELEYE_SERVER : ${KERNELEYE_SERVER}
      KERNELEYE_GRPC_URL : ${KERNELEYE_GRPC_URL}
      PORT: 8080
      POLAR_ENV: ${POLAR_ENV}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      GRPC_PORT: 9091
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      API_KEY_SECRET: ${API_KEY_SECRET}
      DASHBOARD_URL: ${DASHBOARD_URL}
      MAILTRAP_API_TOKEN: ${MAILTRAP_API_TOKEN}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      POLAR_WEBHOOK_SECRET: ${POLAR_WEBHOOK_SECRET}
      POLAR_ACCESS_TOKEN: ${POLAR_ACCESS_TOKEN}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH_REDIRECT_URL: ${OAUTH_REDIRECT_URL}
    depends_on:
      kerneleye-db:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
    
      # HTTP API
      - "traefik.http.routers.kernelapi.rule=Host(`api.kerneleye.net`)"
      - "traefik.http.routers.kernelapi.entrypoints=websecure"
      - "traefik.http.routers.kernelapi.tls=true"
      - "traefik.http.routers.kernelapi.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kernelapi.service=kernelapi"
      - "traefik.http.services.kernelapi.loadbalancer.server.port=8080"
      - "traefik.http.services.kernelapi.loadbalancer.server.scheme=http"

    
      # gRPC
      - "traefik.http.routers.kernelgrpc.rule=PathPrefix(/kerneleye.v1)"
      - "traefik.http.routers.kernelgrpc.entrypoints=websecure"
      - "traefik.http.routers.kernelgrpc.tls=true"
      - "traefik.http.routers.kernelgrpc.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kernelgrpc.service=kernelgrpc"
      - "traefik.http.services.kernelgrpc.loadbalancer.server.port=9091"
      - "traefik.http.services.kernelgrpc.loadbalancer.server.scheme=h2"

  # Frontend (Landing + Dashboard)
  # Serves static files only - API calls go directly to backend
  frontend:
    networks:
      - dokploy-network
    image: registry.hakiware.com/kerneleye/frontend:latest
    pull_policy: always
    environment:
      # Backend API URL (for dashboard runtime config)
      BACKEND_HOST: ${BACKEND_HOST}
      BACKEND_PORT: ${BACKEND_PORT}
      # Domain names (for nginx server_name)
      LANDING_DOMAIN: ${LANDING_DOMAIN}
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN}
    restart: unless-stopped

  # Redis (Optional - for caching in production)
  redis:
    image: redis:7-alpine
    pull_policy: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
volumes:
  postgres_data:
  redis_data:

networks:
  dokploy-network:
    external: true